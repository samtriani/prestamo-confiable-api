# fly.toml app configuration file generated for prestamo-confiable-api on 2026-04-14T19:09:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'prestamo-confiable-api'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/api/actuator/health"
    port = 8080
    timeout = "10s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
